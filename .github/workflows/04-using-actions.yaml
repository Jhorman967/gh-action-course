name: 04 - Using Actions

on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v3
        - name: setup Node JS
          uses: actions/setup-node@v3
          with:
            node-version: 20.x
        - name: Install dependencies
          uses: chill-viking/npm-ci@latest
          with:
            working-directory: ./04-using-actions/mi-app
