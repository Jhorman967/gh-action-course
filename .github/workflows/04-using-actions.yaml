name: 04 - Using Actions

on: workflow_dispatch

jobs:
    build:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: 04-using-actions/mi-app

        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: setup Node JS
          uses: actions/setup-node@v3
          with:
            node-version: '20.x'
        - name: list files
          run: ls -la
        - name: Install dependencies
          run: npm install

        - name: Run tests

          run: npm run test
  